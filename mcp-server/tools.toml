# ──────────────────────────────────────────────
#  СИСТЕМНАЯ ИНФОРМАЦИЯ
# ──────────────────────────────────────────────
[[tools]]
name = "uname"
description = "Вывести информацию о системе (ядро, архитектура, версия)"
command = "uname -a"

[[tools]]
name = "uptime"
description = "Показать время работы системы и среднюю нагрузку"
command = "uptime"

[[tools]]
name = "free"
description = "Показать использование памяти (RAM и swap)"
command = "free -h"

[[tools]]
name = "df"
description = "Показать свободное место на дисках"
command = "df -h"

[[tools]]
name = "du"
description = "Показать размер директории"
command = "du -sh {path}"

[tools.parameters.path]
type = "string"
description = "Путь к директории (по умолчанию текущая)"
required = false

[[tools]]
name = "lsblk"
description = "Показать блочные устройства (диски, разделы)"
command = "lsblk"

[[tools]]
name = "lscpu"
description = "Информация о процессоре"
command = "lscpu"

[[tools]]
name = "lspci"
description = "Показать PCI-устройства"
command = "lspci"

[[tools]]
name = "lsusb"
description = "Показать USB-устройства"
command = "lsusb"

[[tools]]
name = "dmidecode"
description = "Информация о аппаратном обеспечении (требует root)"
command = "dmidecode -t system"

[[tools]]
name = "sensors"
description = "Показать температуру компонентов (если установлены lm-sensors)"
command = "sensors"

[[tools]]
name = "hostname"
description = "Показать или установить имя хоста"
command = "hostname"

[[tools]]
name = "date"
description = "Показать или установить системную дату/время"
command = "date"

# ──────────────────────────────────────────────
#  ПРОЦЕССЫ
# ──────────────────────────────────────────────
[[tools]]
name = "ps"
description = "Показать запущенные процессы"
command = "ps aux"

[[tools]]
name = "top"
description = "Интерактивный список процессов (однократный вывод)"
command = "top -b -n 1"

[[tools]]
name = "kill"
description = "Отправить сигнал процессу по PID"
command = "kill {signal} {pid}"

[tools.parameters.signal]
type = "string"
description = "Сигнал (например, -9)"
required = false

[tools.parameters.pid]
type = "integer"
description = "PID процесса"
required = true

[[tools]]
name = "killall"
description = "Убить процессы по имени"
command = "killall {name}"

[tools.parameters.name]
type = "string"
description = "Имя процесса"
required = true

[[tools]]
name = "pgrep"
description = "Найти PID процесса по имени"
command = "pgrep {pattern}"

[tools.parameters.pattern]
type = "string"
description = "Шаблон имени"
required = true

[[tools]]
name = "nice"
description = "Запустить программу с изменённым приоритетом"
command = "nice -n {priority} {command}"

[tools.parameters.priority]
type = "integer"
description = "Приоритет (от -20 до 19)"
required = true

[tools.parameters.command]
type = "string"
description = "Команда для запуска"
required = true

[[tools]]
name = "renice"
description = "Изменить приоритет существующего процесса"
command = "renice {priority} -p {pid}"

[tools.parameters.priority]
type = "integer"
description = "Новый приоритет"
required = true

[tools.parameters.pid]
type = "integer"
description = "PID процесса"
required = true

# ──────────────────────────────────────────────
#  СЕТЬ
# ──────────────────────────────────────────────
[[tools]]
name = "ip_addr"
description = "Показать IP-адреса интерфейсов"
command = "ip addr show"

[[tools]]
name = "ifconfig"
description = "Показать или настроить сетевые интерфейсы (устаревшая)"
command = "ifconfig"

[[tools]]
name = "ping"
description = "Пропинговать хост"
command = "ping -c {count} {host}"

[tools.parameters.count]
type = "integer"
description = "Количество пакетов"
required = false

[tools.parameters.host]
type = "string"
description = "Целевой хост"
required = true

[[tools]]
name = "traceroute"
description = "Трассировка маршрута до хоста"
command = "traceroute {host}"

[tools.parameters.host]
type = "string"
description = "Целевой хост"
required = true

[[tools]]
name = "nslookup"
description = "Запросить DNS-записи"
command = "nslookup {domain}"

[tools.parameters.domain]
type = "string"
description = "Доменное имя"
required = true

[[tools]]
name = "dig"
description = "Расширенная утилита DNS-запросов"
command = "dig {domain} {type}"

[tools.parameters.domain]
type = "string"
description = "Доменное имя"
required = true

[tools.parameters.type]
type = "string"
description = "Тип записи (A, MX, TXT и т.д.)"
required = false

[[tools]]
name = "netstat"
description = "Сетевые соединения, таблицы маршрутизации, статистика"
command = "netstat -tulpn"

[[tools]]
name = "ss"
description = "Современная замена netstat"
command = "ss -tulpn"

[[tools]]
name = "nmap"
description = "Сканирование портов (если установлен nmap)"
command = "nmap {target}"

[tools.parameters.target]
type = "string"
description = "Цель (IP или домен)"
required = true

[[tools]]
name = "tcpdump"
description = "Захват сетевых пакетов (требует root)"
command = "tcpdump -i {interface} -c {count}"

[tools.parameters.interface]
type = "string"
description = "Сетевой интерфейс"
required = true

[tools.parameters.count]
type = "integer"
description = "Количество пакетов"
required = false

[[tools]]
name = "iptables_list"
description = "Показать правила iptables"
command = "iptables -L -n -v"

[[tools]]
name = "ufw_status"
description = "Статус UFW"
command = "ufw status verbose"

[[tools]]
name = "ufw_enable"
description = "Включить UFW"
command = "ufw --force enable"

[[tools]]
name = "ufw_disable"
description = "Отключить UFW"
command = "ufw --force disable"

[[tools]]
name = "ufw_allow"
description = "Разрешить порт/сервис в UFW"
command = "ufw allow {port}"

[tools.parameters.port]
type = "string"
description = "Порт или сервис (например, 22/tcp)"
required = true

[[tools]]
name = "ufw_deny"
description = "Запретить порт/сервис в UFW"
command = "ufw deny {port}"

[tools.parameters.port]
type = "string"
description = "Порт или сервис"
required = true

# ──────────────────────────────────────────────
#  ФАЙЛЫ И ДИРЕКТОРИИ
# ──────────────────────────────────────────────
[[tools]]
name = "ls"
description = "Список файлов в директории"
command = "ls -la {path}"

[tools.parameters.path]
type = "string"
description = "Путь к директории"
required = false

[[tools]]
name = "cat"
description = "Вывести содержимое файла"
command = "cat {file}"

[tools.parameters.file]
type = "string"
description = "Путь к файлу"
required = true

[[tools]]
name = "less"
description = "Просмотр файла с прокруткой (вывод через cat)"
command = "cat {file}"

[tools.parameters.file]
type = "string"
description = "Путь к файлу"
required = true

[[tools]]
name = "head"
description = "Показать первые строки файла"
command = "head -n {lines} {file}"

[tools.parameters.lines]
type = "integer"
description = "Количество строк"
required = false

[tools.parameters.file]
type = "string"
description = "Путь к файлу"
required = true

[[tools]]
name = "tail"
description = "Показать последние строки файла"
command = "tail -n {lines} {file}"

[tools.parameters.lines]
type = "integer"
description = "Количество строк"
required = false

[tools.parameters.file]
type = "string"
description = "Путь к файлу"
required = true

[[tools]]
name = "touch"
description = "Создать пустой файл или обновить временные метки"
command = "touch {file}"

[tools.parameters.file]
type = "string"
description = "Имя файла"
required = true

[[tools]]
name = "mkdir"
description = "Создать директорию"
command = "mkdir -p {path}"

[tools.parameters.path]
type = "string"
description = "Путь к новой директории"
required = true

[[tools]]
name = "rm"
description = "Удалить файл(ы)"
command = "rm -rf {path}"

[tools.parameters.path]
type = "string"
description = "Путь к файлу или директории"
required = true

[[tools]]
name = "cp"
description = "Копировать файлы или директории"
command = "cp -r {source} {dest}"

[tools.parameters.source]
type = "string"
description = "Исходный путь"
required = true

[tools.parameters.dest]
type = "string"
description = "Путь назначения"
required = true

[[tools]]
name = "mv"
description = "Переместить или переименовать"
command = "mv {source} {dest}"

[tools.parameters.source]
type = "string"
description = "Исходный путь"
required = true

[tools.parameters.dest]
type = "string"
description = "Путь назначения"
required = true

[[tools]]
name = "find"
description = "Поиск файлов"
command = "find {path} -name '{pattern}'"

[tools.parameters.path]
type = "string"
description = "Начальная директория"
required = false

[tools.parameters.pattern]
type = "string"
description = "Шаблон имени файла"
required = true

[[tools]]
name = "grep"
description = "Поиск текста в файлах или выводе"
command = "grep -r '{pattern}' {path}"

[tools.parameters.pattern]
type = "string"
description = "Регулярное выражение"
required = true

[tools.parameters.path]
type = "string"
description = "Путь к файлу или директории"
required = false

[[tools]]
name = "wc"
description = "Подсчёт строк, слов, символов"
command = "wc -l {file}"

[tools.parameters.file]
type = "string"
description = "Путь к файлу"
required = true

[[tools]]
name = "sort"
description = "Сортировка строк"
command = "sort {file}"

[tools.parameters.file]
type = "string"
description = "Путь к файлу"
required = true

[[tools]]
name = "uniq"
description = "Удалить дубликаты строк (обычно после sort)"
command = "uniq {file}"

[tools.parameters.file]
type = "string"
description = "Путь к файлу"
required = true

[[tools]]
name = "diff"
description = "Сравнить два файла построчно"
command = "diff {file1} {file2}"

[tools.parameters.file1]
type = "string"
description = "Первый файл"
required = true

[tools.parameters.file2]
type = "string"
description = "Второй файл"
required = true

[[tools]]
name = "tar_create"
description = "Создать tar-архив"
command = "tar -czf {archive} {path}"

[tools.parameters.archive]
type = "string"
description = "Имя архива (.tar.gz)"
required = true

[tools.parameters.path]
type = "string"
description = "Что архивировать"
required = true

[[tools]]
name = "tar_extract"
description = "Распаковать tar-архив"
command = "tar -xzf {archive} -C {dest}"

[tools.parameters.archive]
type = "string"
description = "Путь к архиву"
required = true

[tools.parameters.dest]
type = "string"
description = "Куда распаковать"
required = false

[[tools]]
name = "gzip"
description = "Сжать файл через gzip"
command = "gzip {file}"

[tools.parameters.file]
type = "string"
description = "Файл для сжатия"
required = true

[[tools]]
name = "gunzip"
description = "Распаковать .gz"
command = "gunzip {file}"

[tools.parameters.file]
type = "string"
description = "Файл .gz"
required = true

[[tools]]
name = "zip"
description = "Создать zip-архив"
command = "zip {archive} {files}"

[tools.parameters.archive]
type = "string"
description = "Имя архива"
required = true

[tools.parameters.files]
type = "string"
description = "Файлы для упаковки"
required = true

[[tools]]
name = "unzip"
description = "Распаковать zip-архив"
command = "unzip {archive} -d {dest}"

[tools.parameters.archive]
type = "string"
description = "Путь к архиву"
required = true

[tools.parameters.dest]
type = "string"
description = "Директория для распаковки"
required = false

# ──────────────────────────────────────────────
#  ПОЛЬЗОВАТЕЛИ И ГРУППЫ
# ──────────────────────────────────────────────
[[tools]]
name = "useradd"
description = "Создать пользователя"
command = "useradd -m {username}"

[tools.parameters.username]
type = "string"
description = "Логин"
required = true

[[tools]]
name = "usermod"
description = "Изменить пользователя"
command = "usermod -aG {group} {username}"

[tools.parameters.group]
type = "string"
description = "Группа"
required = true

[tools.parameters.username]
type = "string"
description = "Пользователь"
required = true

[[tools]]
name = "userdel"
description = "Удалить пользователя"
command = "userdel -r {username}"

[tools.parameters.username]
type = "string"
description = "Пользователь"
required = true

[[tools]]
name = "passwd"
description = "Изменить пароль пользователя (интерактивно не получится, поэтому через chpasswd)"
command = "echo '{username}:{password}' | chpasswd"

[tools.parameters.username]
type = "string"
description = "Пользователь"
required = true

[tools.parameters.password]
type = "string"
description = "Новый пароль"
required = true

[[tools]]
name = "groupadd"
description = "Создать группу"
command = "groupadd {group}"

[tools.parameters.group]
type = "string"
description = "Имя группы"
required = true

[[tools]]
name = "who"
description = "Кто сейчас в системе"
command = "who"

[[tools]]
name = "w"
description = "Кто и что делает"
command = "w"

[[tools]]
name = "last"
description = "История входов в систему"
command = "last -n 20"

[[tools]]
name = "su"
description = "Переключиться на другого пользователя (в рамках команды)"
command = "su - {user} -c '{command}'"

[tools.parameters.user]
type = "string"
description = "Пользователь"
required = true

[tools.parameters.command]
type = "string"
description = "Команда"
required = true

# ──────────────────────────────────────────────
#  ПАКЕТЫ (APT, DPKG, SNAP, PIP, NPM...)
# ──────────────────────────────────────────────
[[tools]]
name = "apt_update"
description = "Обновить список пакетов"
command = "apt update"

[[tools]]
name = "apt_upgrade"
description = "Обновить все пакеты"
command = "apt upgrade -y"

[[tools]]
name = "apt_install"
description = "Установить пакет"
command = "apt install -y {pkg}"

[tools.parameters.pkg]
type = "string"
description = "Имя пакета"
required = true

[[tools]]
name = "apt_remove"
description = "Удалить пакет"
command = "apt remove -y {pkg}"

[tools.parameters.pkg]
type = "string"
description = "Имя пакета"
required = true

[[tools]]
name = "apt_search"
description = "Поиск пакета"
command = "apt search {query}"

[tools.parameters.query]
type = "string"
description = "Поисковый запрос"
required = true

[[tools]]
name = "apt_list_installed"
description = "Показать установленные пакеты"
command = "apt list --installed"

[[tools]]
name = "dpkg_install"
description = "Установить .deb пакет вручную"
command = "dpkg -i {file}"

[tools.parameters.file]
type = "string"
description = "Путь к .deb файлу"
required = true

[[tools]]
name = "snap_install"
description = "Установить snap-пакет"
command = "snap install {pkg}"

[tools.parameters.pkg]
type = "string"
description = "Имя пакета"
required = true

[[tools]]
name = "pip_install"
description = "Установить Python-пакет через pip"
command = "pip install {pkg}"

[tools.parameters.pkg]
type = "string"
description = "Имя пакета"
required = true

[[tools]]
name = "npm_install"
description = "Установить Node.js пакет глобально"
command = "npm install -g {pkg}"

[tools.parameters.pkg]
type = "string"
description = "Имя пакета"
required = true

[[tools]]
name = "gem_install"
description = "Установить Ruby gem"
command = "gem install {gem}"

[tools.parameters.gem]
type = "string"
description = "Название gem"
required = true

# ──────────────────────────────────────────────
#  СЛУЖБЫ (SYSTEMCTL)
# ──────────────────────────────────────────────
[[tools]]
name = "systemctl_status"
description = "Статус службы"
command = "systemctl status {unit}"

[tools.parameters.unit]
type = "string"
description = "Имя службы"
required = true

[[tools]]
name = "systemctl_start"
description = "Запустить службу"
command = "systemctl start {unit}"

[tools.parameters.unit]
type = "string"
description = "Имя службы"
required = true

[[tools]]
name = "systemctl_stop"
description = "Остановить службу"
command = "systemctl stop {unit}"

[tools.parameters.unit]
type = "string"
description = "Имя службы"
required = true

[[tools]]
name = "systemctl_restart"
description = "Перезапустить службу"
command = "systemctl restart {unit}"

[tools.parameters.unit]
type = "string"
description = "Имя службы"
required = true

[[tools]]
name = "systemctl_enable"
description = "Включить автозапуск"
command = "systemctl enable {unit}"

[tools.parameters.unit]
type = "string"
description = "Имя службы"
required = true

[[tools]]
name = "systemctl_disable"
description = "Отключить автозапуск"
command = "systemctl disable {unit}"

[tools.parameters.unit]
type = "string"
description = "Имя службы"
required = true

[[tools]]
name = "systemctl_list_units"
description = "Список всех юнитов"
command = "systemctl list-units"

# ──────────────────────────────────────────────
#  ДИСКИ И ФАЙЛОВЫЕ СИСТЕМЫ
# ──────────────────────────────────────────────
[[tools]]
name = "fdisk"
description = "Управление разделами (просмотр)"
command = "fdisk -l"

[[tools]]
name = "parted"
description = "Информация о разделах"
command = "parted -l"

[[tools]]
name = "mkfs"
description = "Создать файловую систему (ОПАСНО!)"
command = "mkfs.{type} {device}"

[tools.parameters.type]
type = "string"
description = "Тип ФС (ext4, xfs и т.д.)"
required = true

[tools.parameters.device]
type = "string"
description = "Устройство (/dev/sdX1)"
required = true

[[tools]]
name = "mount"
description = "Примонтировать устройство"
command = "mount {device} {mountpoint}"

[tools.parameters.device]
type = "string"
description = "Устройство"
required = true

[tools.parameters.mountpoint]
type = "string"
description = "Точка монтирования"
required = true

[[tools]]
name = "umount"
description = "Отмонтировать"
command = "umount {target}"

[tools.parameters.target]
type = "string"
description = "Устройство или точка монтирования"
required = true

[[tools]]
name = "fsck"
description = "Проверить и исправить файловую систему"
command = "fsck -y {device}"

[tools.parameters.device]
type = "string"
description = "Устройство"
required = true

[[tools]]
name = "dd"
description = "Побайтовое копирование (ОПАСНО)"
command = "dd if={input} of={output} bs=4M status=progress"

[tools.parameters.input]
type = "string"
description = "Источник"
required = true

[tools.parameters.output]
type = "string"
description = "Назначение"
required = true

# ──────────────────────────────────────────────
#  БЕЗОПАСНОСТЬ
# ──────────────────────────────────────────────
[[tools]]
name = "ssh_keygen"
description = "Сгенерировать SSH-ключи"
command = "ssh-keygen -t ed25519 -f {path} -N ''"

[tools.parameters.path]
type = "string"
description = "Путь для сохранения ключа"
required = true

[[tools]]
name = "ssh_copy_id"
description = "Скопировать публичный ключ на сервер"
command = "ssh-copy-id {user}@{host}"

[tools.parameters.user]
type = "string"
description = "Пользователь"
required = true

[tools.parameters.host]
type = "string"
description = "Хост"
required = true

[[tools]]
name = "chmod"
description = "Изменить права доступа"
command = "chmod {mode} {path}"

[tools.parameters.mode]
type = "string"
description = "Права (например, 755)"
required = true

[tools.parameters.path]
type = "string"
description = "Путь"
required = true

[[tools]]
name = "chown"
description = "Сменить владельца"
command = "chown {user}:{group} {path}"

[tools.parameters.user]
type = "string"
description = "Пользователь"
required = true

[tools.parameters.group]
type = "string"
description = "Группа"
required = true

[tools.parameters.path]
type = "string"
description = "Путь"
required = true

# ──────────────────────────────────────────────
#  МОНИТОРИНГ И ЛОГИ
# ──────────────────────────────────────────────
[[tools]]
name = "journalctl"
description = "Просмотр логов systemd"
command = "journalctl -n {lines}"

[tools.parameters.lines]
type = "integer"
description = "Количество строк"
required = false

[[tools]]
name = "dmesg"
description = "Сообщения ядра"
command = "dmesg | tail -n 50"

[[tools]]
name = "vmstat"
description = "Статистика виртуальной памяти"
command = "vmstat 1 5"

[[tools]]
name = "iostat"
