required = true

[[tools]]
name = "scp_download"
description = "Скачать файл с удалённого сервера"
command = "scp -o StrictHostKeyChecking=no -i {key} {user}@{host}:{remote_path} {local_path}"

[tools.parameters.key]
type = "string"
description = "Путь к ключу"
required = true

[tools.parameters.user]
type = "string"
description = "Пользователь"
required = true

[tools.parameters.host]
type = "string"
description = "Хост"
required = true

[tools.parameters.remote_path]
type = "string"
description = "Удалённый путь"
required = true

[tools.parameters.local_path]
type = "string"
description = "Локальный путь"
required = true

# ──────────────────────────────────────────────
#  УНИВЕРСАЛЬНАЯ КОМАНДА (должна быть последней)
# ──────────────────────────────────────────────
[[tools]]
name = "run_command"
description = "Выполнить произвольную shell-команду"
command = "{command}"

[tools.parameters.command]
type = "string"
description = "Команда"
required = true
