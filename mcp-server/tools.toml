# --- Работа с текстом и данными ---
[[tools]]
name = "awk_print"
description = "Вывести определённый столбец из вывода или файла (awk '{print $1}')"
command = "awk '{print ${col}}' {file}"

[tools.parameters.col]
type = "integer"
description = "Номер столбца"
required = true

[tools.parameters.file]
type = "string"
description = "Файл (если не указан, читает stdin)"
required = false

[[tools]]
name = "sed_replace"
description = "Заменить текст в файле (sed -i 's/old/new/g')"
command = "sed -i 's/{old}/{new}/g' {file}"

[tools.parameters.old]
type = "string"
description = "Что заменить"
required = true

[tools.parameters.new]
type = "string"
description = "На что заменить"
required = true

[tools.parameters.file]
type = "string"
description = "Файл"
required = true

[[tools]]
name = "tr"
description = "Заменить или удалить символы (echo 'text' | tr 'a-z' 'A-Z')"
command = "echo '{text}' | tr '{from}' '{to}'"

[tools.parameters.text]
type = "string"
description = "Входной текст"
required = true

[tools.parameters.from]
type = "string"
description = "Набор символов для замены"
required = true

[tools.parameters.to]
type = "string"
description = "Набор символов-замен"
required = true

[[tools]]
name = "cut"
description = "Вырезать поля из строк (по разделителю)"
command = "cut -d'{delim}' -f{fields} {file}"

[tools.parameters.delim]
type = "string"
description = "Разделитель"
required = true

[tools.parameters.fields]
type = "string"
description = "Номера полей (например, 1,3)"
required = true

[tools.parameters.file]
type = "string"
description = "Файл"
required = false

[[tools]]
name = "sort_data"
description = "Отсортировать строки файла"
command = "sort {file}"

[tools.parameters.file]
type = "string"
description = "Файл"
required = true

[[tools]]
name = "uniq_data"
description = "Оставить только уникальные строки (обычно после sort)"
command = "uniq {file}"

[tools.parameters.file]
type = "string"
description = "Файл"
required = true

[[tools]]
name = "wc_all"
description = "Подсчитать строки, слова, байты"
command = "wc {file}"

[tools.parameters.file]
type = "string"
description = "Файл"
required = true

[[tools]]
name = "tee"
description = "Записать вывод в файл и одновременно показать на экране"
command = "echo '{text}' | tee {file}"

[tools.parameters.text]
type = "string"
description = "Текст"
required = true

[tools.parameters.file]
type = "string"
description = "Файл"
required = true

